<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ChurnGuard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1 class="logo-title">ChurnGuard</h1>
        </div>

        <div class="login-card">
            <div class="card-header">
                <h2>New Password</h2>
                <p>Please enter your new administrator password</p>
            </div>

            <form id="resetPasswordForm" class="login-form">
                <input type="hidden" id="resetToken" value="{{ token }}">
                
                <div class="form-group">
                    <label for="newPassword">
                        <i class="fas fa-lock"></i>
                        New Password
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="newPassword" 
                            placeholder="Min. 8 characters"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-double"></i>
                        Confirm Password
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="Re-enter password"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="login-btn" id="resetBtn">
                    <span class="btn-text">
                        <i class="fas fa-save"></i>
                        Update Password
                    </span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                        Updating...
                    </span>
                </button>
            </form>

            <div class="error-message" id="errorMessage" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/reset_password.js"></script>
</body>
</html>
